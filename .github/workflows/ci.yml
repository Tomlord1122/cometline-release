name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: comet-sdk/go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: cometline/package.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cometline/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: make install

      - name: Run checks
        run: make check

      - name: Run build
        run: make build
