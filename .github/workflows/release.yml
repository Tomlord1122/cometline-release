name: Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release-macos:
    runs-on: macos-latest
    environment: cometline-release
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.COMETLINE_SUBMODULE_TOKEN }}
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            echo "Using existing tag: $TAG"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git describe --exact-match --tags HEAD 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Commit $(git rev-parse --short HEAD) already has tag $(git describe --exact-match --tags HEAD)"
            exit 0
          fi

          LATEST="$(git tag -l 'v*' --sort=-version:refname | head -1)"
          if [ -z "$LATEST" ]; then
            NEXT="v0.0.1"
          else
            VERSION="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            if [ "$PATCH" -gt 999 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
            if [ "$MINOR" -gt 999 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          if git rev-parse "$NEXT" >/dev/null 2>&1; then
            echo "Tag $NEXT already exists"
            exit 1
          fi

          echo "Latest tag: ${LATEST:-<none>}"
          echo "Next tag: $NEXT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag -a "$NEXT" -m "Release $NEXT"
          git push origin "$NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        if: steps.release_tag.outputs.skip != 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: cometmind/go.mod
          cache-dependency-path: |
            comet-sdk/go.sum
            cometmind/go.sum

      - name: Setup pnpm
        if: steps.release_tag.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          package_json_file: cometline/package.json

      - name: Setup Node.js
        if: steps.release_tag.outputs.skip != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cometline/pnpm-lock.yaml

      - name: Install frontend dependencies
        if: steps.release_tag.outputs.skip != 'true'
        run: pnpm --dir cometline install --frozen-lockfile

      - name: Sync package version from tag
        if: steps.release_tag.outputs.skip != 'true'
        env:
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          CURRENT="$(node -p "require('./cometline/package.json').version")"
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "package.json already at $VERSION; skipping version bump"
          else
            pnpm --dir cometline version "$VERSION" --no-git-tag-version
          fi

      - name: Configure GitHub release target
        if: steps.release_tag.outputs.skip != 'true'
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'cometline/package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          pkg.build.publish = [{ provider: 'github', owner, repo }];
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, '\t')}\n`);
          NODE

      - name: Remove stale releases for this tag
        if: steps.release_tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          set -euo pipefail
          # electron-builder used to create partial DRAFT releases whose tag is
          # not yet attached (they appear as "untagged-*"). Delete both the
          # properly tagged release for this tag and any untagged drafts whose
          # assets belong to this version so the run starts from a clean slate.
          VERSION="${TAG#v}"
          gh api -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/releases?per_page=100" \
            --jq '.[] | [.id, .tag_name, .draft, ((.assets // []) | map(.name) | join(","))] | @tsv' \
            | while IFS=$'\t' read -r id tag draft assets; do
                if [ "$tag" = "$TAG" ]; then
                  echo "Deleting existing release $id (tag $tag)"
                  gh api -X DELETE "/repos/${{ github.repository }}/releases/$id"
                elif [ "$draft" = "true" ] && printf '%s' "$assets" | grep -q "$VERSION"; then
                  echo "Deleting stale untagged draft $id (assets: $assets)"
                  gh api -X DELETE "/repos/${{ github.repository }}/releases/$id"
                fi
              done
          # Drop the git tag ref on any leftover draft so a fresh release can be created.
          true

      - name: Build, sign, and notarize
        if: steps.release_tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm --dir cometline run build:mac

      - name: Verify build artifacts
        if: steps.release_tag.outputs.skip != 'true'
        run: |
          set -euo pipefail
          test -f cometline/dist/latest-mac.yml
          ls -lh cometline/dist/*.dmg cometline/dist/*.zip cometline/dist/*.blockmap
          # Fail early if the large binaries are missing/empty.
          for f in cometline/dist/*.dmg cometline/dist/*.zip; do
            test -s "$f"
          done

      - name: Publish GitHub Release
        if: steps.release_tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          set -euo pipefail
          # Create a NON-draft release and upload every asset synchronously.
          # gh release create waits for each upload to finish, unlike
          # electron-builder's fire-and-forget --publish always.
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes \
            cometline/dist/*.dmg \
            cometline/dist/*.dmg.blockmap \
            cometline/dist/*.zip \
            cometline/dist/*.zip.blockmap \
            cometline/dist/latest-mac.yml

      - name: Verify release assets uploaded
        if: steps.release_tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          set -euo pipefail
          ASSETS="$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')"
          echo "Uploaded assets:"
          echo "$ASSETS"
          for required in latest-mac.yml; do
            echo "$ASSETS" | grep -q "$required" || { echo "Missing $required"; exit 1; }
          done
          echo "$ASSETS" | grep -q '\.dmg$' || { echo "Missing .dmg"; exit 1; }
          echo "$ASSETS" | grep -q '\-mac\.zip$' || { echo "Missing -mac.zip"; exit 1; }
